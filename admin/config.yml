backend:
  name: git-gateway
  branch: main
  identity_url: "https://horschamp74.fr/.netlify/identity"
  gateway_url: "https://horschamp74.fr/.netlify/git"

media_folder: "images"
public_folder: "/images"

collections:
  - name: "breves"
    label: "Brèves du jour"
    folder: "_breves"
    create: true
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Contenu", name: "body", widget: "markdown"}
