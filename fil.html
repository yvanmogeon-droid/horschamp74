<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Le fil — Hors Champ 74</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --noir: #1a1714;
  --encre: #2c2825;
  --terre: #8B3A1A;
  --rouge: #C4522A;
  --creme: #faf7f2;
  --sable: #f5f0e8;
  --gris: #7a736b;
  --gris-clair: #c8c0b4;
  --bordure: #ddd5c8;
  --max: 800px;
}
body {
  background: var(--creme);
  color: var(--encre);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.6;
}
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--creme);
  border-bottom: 1px solid var(--bordure);
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}
.h-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.h-logo span {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--encre);
}
.h-logo span em { font-style: normal; color: var(--rouge); }
nav { display: flex; align-items: center; gap: 28px; }
nav a {
  font-size: 12px; font-weight: 400; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--gris);
  text-decoration: none;
}
nav a:hover { color: var(--rouge); }

.fil-page { padding-top: 58px; }
.fil-page-inner {
  max-width: var(--max);
  margin: 0 auto;
  padding: 64px 32px;
}
.fil-page-titre {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 700;
  margin-bottom: 12px;
}
.fil-page-sous {
  font-size: 15px;
  color: var(--gris);
  margin-bottom: 48px;
}
.filtres {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--bordure);
}
.filtre {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 16px;
  border: 1px solid var(--bordure);
  background: none;
  cursor: pointer;
  color: var(--gris);
  transition: all 0.2s;
}
.filtre:hover, .filtre.actif {
  background: var(--encre);
  color: var(--creme);
  border-color: var(--encre);
}
#liste-breves { list-style: none; }
.article {
  padding: 28px 0;
  border-bottom: 1px solid var(--bordure);
}
.article:last-child { border-bottom: none; }
.art-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}
.art-date {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gris-clair);
}
.art-tag {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border: 1px solid currentColor;
}
.t-pollution { color: var(--terre); }
.t-dechets { color: var(--gris); }
.t-animaux { color: #4a7c59; }
.t-good-news { color: #2d6a4f; }
.t-montagne { color: #3a5f8a; }
.t-curieux { color: #7a5c8a; }
.art-titre {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 10px;
}
.art-extrait {
  font-size: 13px;
  color: var(--gris);
  line-height: 1.6;
  margin-bottom: 16px;
}
.art-lire {
  font-size: 12px;
  font-weight: 500;
  color: var(--rouge);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: gap 0.2s;
}
.art-lire:hover { gap: 12px; }
#message-vide {
  color: var(--gris);
  font-style: italic;
  padding: 40px 0;
  display: none;
}
footer {
  background: var(--encre);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 40px 20px;
  text-align: center;
}
.f-copy { font-size: 11px; color: rgba(250,247,242,0.25); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="h-logo">
    <span>Hors <em>Champ</em> 74</span>
  </a>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="fil.html">Le fil</a>
  </nav>
</header>

<div class="fil-page">
  <div class="fil-page-inner">
    <h1 class="fil-page-titre">Le fil</h1>
    <p class="fil-page-sous">Tout ce qu'on a vu, signalé, raconté. Haute-Savoie, en continu.</p>

    <div class="filtres">
      <button class="filtre actif" data-cat="tout">Tout</button>
      <button class="filtre" data-cat="pollution">Pollution</button>
      <button class="filtre" data-cat="dechets">Déchets</button>
      <button class="filtre" data-cat="animaux">Animaux</button>
      <button class="filtre" data-cat="good-news">Good News</button>
      <button class="filtre" data-cat="montagne">Montagne & Nature</button>
      <button class="filtre" data-cat="curieux">Le coin des curieux</button>
    </div>

    <ul id="liste-breves"></ul>
    <p id="message-vide">Aucune brève dans cette rubrique pour l'instant.</p>
  </div>
</div>

<footer>
  <p class="f-copy">© 2026 Hors Champ 74 — Haute-Savoie, sans filtre</p>
</footer>

<script>
const LABELS = {
  pollution: 'Pollution',
  dechets: 'Déchets',
  animaux: 'Animaux',
  'good-news': 'Good News',
  montagne: 'Montagne & Nature',
  curieux: 'Curieux',
};

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

let toutesBreves = [];
let filtreActif = 'tout';

function afficher() {
  const liste = document.getElementById('liste-breves');
  const msgVide = document.getElementById('message-vide');
  const breves = filtreActif === 'tout'
    ? toutesBreves
    : toutesBreves.filter(b => b.category === filtreActif);

  if (breves.length === 0) {
    liste.innerHTML = '';
    msgVide.style.display = 'block';
    return;
  }
  msgVide.style.display = 'none';
  liste.innerHTML = breves.map(b => `
    <li class="article" data-cat="${b.category}">
      <div class="art-meta">
        <span class="art-date">${formatDate(b.date)}</span>
        <span class="art-tag t-${b.category}">${LABELS[b.category] || b.category}</span>
      </div>
      <h2 class="art-titre">${b.titre}</h2>
      <p class="art-extrait">${b.extrait}</p>
      <a class="art-lire" href="${b.url}">Lire la brève →</a>
    </li>
  `).join('');
}

document.querySelectorAll('.filtre').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtre').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    filtreActif = btn.dataset.cat;
    afficher();
  });
});

// Chargement de breves.json
fetch('breves.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    toutesBreves = data;
    afficher();
  })
  .catch(() => {
    document.getElementById('message-vide').style.display = 'block';
    document.getElementById('message-vide').textContent = 'Impossible de charger les brèves.';
  });
</script>

</body>
</html>
